[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Medium"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"

[window]
opacity = 0.85
blur = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]
