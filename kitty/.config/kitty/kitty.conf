# Font
font_family JetBrainsMono Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13

# Transparency
background_opacity 0.85

# Enable blur (Wayland + compositor required like picom)
background_blur 1

# Terminal type
term xterm-256color

# Performance
enable_audio_bell no

# Cursor
cursor_shape block

# Padding
window_padding_width 6

include themes/mocha.conf
