[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 22pt
radius = 2

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true 

line-size = 6pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}

#font-0 = MesloLGS Nerd Font Mono:size=14;6
font-0 = CaskaydiaCove Nerd Font Propo:size=13;3

modules-left = xworkspaces systray
modules-right = bluetooth pulseaudio battery memory cpu wlan date uptime

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline= ${colors.lauve}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = Muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 99
low-at = 20
poll-interval = 5

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

format-charging-prefix = "CHR "
format-charging-prefix-foreground = ${colors.green}
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}
format-full-prefix = "CHR "
format-full-prefix-foreground = ${colors.green}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %essid% %{F#F0C674}%netspeed%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/bluetooth]
type = custom/script
exec = bluetoothctl info AC:C0:13:93:15:98 2>/dev/null | grep -q "Connected: yes" && echo "$(bluetoothctl info AC:C0:13:93:15:98 | grep 'Alias' | cut -d' ' -f2-) ($(upower -i /org/freedesktop/UPower/devices/headset_dev_AC_C0_13_93_15_98 2>/dev/null | grep percentage | awk '{print $2}'))" || echo "BT off"
interval = 3
format-prefix = "BT "
format-prefix-foreground = ${colors.primary}
click-left = blueman-manager &

[module/uptime]
type = custom/script
exec = uptime -p | sed 's/up //' | sed 's/ hours\?/hr/' | sed 's/ minutes\?/min/' | sed 's/ days\?/d/'
interval = 60
format-prefix = "UP "
format-prefix-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1

date = %a, %d %b  %H:%M:%S
date-alt = %H:%M

label = %{F#1CFFF9}%date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
