# Start XDG autostart .desktop files using dex. See also
# https://wiki.archlinux.org/index.php/XDG_Autostart
exec --no-startup-id dex --autostart --environment i3
exec --no-startup-id copyq
exec --no-startup-id blueman-applet
exec --no-startup-id espanso start
exec --no-startup-id setxkbmap -option caps:none
exec --no-startup-id numlockx on
exec --no-startup-id dunst -config ~/.config/dunst/dunstrc
exec --no-startup-id cd ~/Downloads/Battery-Alarm/ && uv run linux_ver.py &

exec_always --no-startup-id picom --config ~/.config/picom/picom.conf --no-ewmh-fullscreen 2>/dev/null
exec_always --no-startup-id feh --bg-scale ~/dotfiles//Wallpapers/car-with-full-moon-background.jpg
exec_always --no-startup-id killall polybar
exec_always --no-startup-id ~/.config/polybar/launch_polybar.sh
exec_always --no-startup-id xrandr --output HDMI-1 --primary --mode 1920x1080 --rate 119.98 --left-of eDP-1

# Caps Lock  ❌ Ctrl ✅ 
exec_always --no-startup-id setxkbmap -option ctrl:nocaps

# Disable the trackpad input while typing
exec --no-startup-id xinput set-prop "ELAN0712:00 04F3:30FD Touchpad" "libinput Disable While Typing Enabled" 1
